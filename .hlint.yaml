# himari hlint configuration
#
# このファイルはDhallによって自動生成されています。
# 直接編集しないでください。
#
# himariが推奨するスタイルを機械的にチェックするためのhlint設定ファイルです。
# 部分関数や危険な関数の使用を警告したり、
# より可読性の高いパターンを提案します。
