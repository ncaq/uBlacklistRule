    - "-XDefaultSignatures"
    - "-XDerivingVia"
    - "-XDuplicateRecordFields"
    - "-XFunctionalDependencies"
    - "-XLexicalNegation"
    - "-XLinearTypes"
    - "-XMonadComprehensions"
    - "-XMultiWayIf"
    - "-XNegativeLiterals"
    - "-XNoFieldSelectors"
    - "-XNoImplicitPrelude"
    - "-XOverloadedLabels"
    - "-XOverloadedRecordDot"
    - "-XOverloadedStrings"
    - "-XParallelListComp"
    - "-XPatternSynonyms"
    - "-XQualifiedDo"
    - "-XQuantifiedConstraints"
    - "-XQuasiQuotes"
    - "-XRecordWildCards"
    - "-XRecursiveDo"
    - "-XStrictData"
    - "-XTemplateHaskell"
    - "-XTypeData"
    - "-XTypeFamilies"
    - "-XTypeFamilyDependencies"
    - "-XViewPatterns"
